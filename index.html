<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
    
  </head>
    <body>
    <a-scene>
      <a-sky color="black"></a-sky>
      
       <!-- Put this inside the <a-scene> -->
      <a-entity ply-model="src:Bedroom Bed.ply" position="2.6 -3.4 -3.4" rotation="-90 90 90"></a-entity>

      <a-entity ply-model="src:Bedroom Door.ply" position="1 -3.4 1.5" rotation="-90 180 90"></a-entity>

      <a-entity ply-model="src:Bedroom Doorframe.ply" position="9 -3.4 18.7" rotation="-90 0 90"></a-entity>

      <a-entity ply-model="src:Bedroom Floor.ply" position="9 -3.5 -6.5" rotation="-90 90 90"></a-entity>

      <a-entity ply-model="src:Bedroom Shelf.ply" position="2.3 -3.4 -0.5" rotation="-90 0 90"></a-entity>

<!--Left wall-->
      <a-entity ply-model="src:Bedroom Wall 2.ply" position="8.9 -3.4 -6.5" rotation="-90 90 90"></a-entity>
<!--Left wall-->
      
      <a-entity ply-model="src:Bedroom Walls 1 & 3.ply" position="9 -3.4 6" rotation="-90 0 90"></a-entity>

<!--Right wall-->
      <a-entity ply-model="src:Bedroom Wall 2.ply" position="-3.6 -3.4 6" rotation="-90 270 90"></a-entity>
<!--Right wall-->
            
<!--Lamps on shelf-->
      <a-entity ply-model="src:Bedroom Lamp (Purple).ply" position="-3.6 1.6 -5.5" rotation="-90 270 90"></a-entity>

      <a-entity ply-model="src:Bedroom Lamp (Blue).ply" position="-2.6 1.6 -5.5" rotation="-90 270 90"></a-entity>

      <a-entity ply-model="src:Bedroom Lamp (Green).ply" position="-1.6 1.6 -5.5" rotation="-90 270 90"></a-entity>

      <a-entity ply-model="src:Bedroom Lamp (Yellow).ply" position="-0.6 1.6 -5.5" rotation="-90 270 90"></a-entity>

      <a-entity ply-model="src:Bedroom Lamp (Pink).ply" position="0.6 1.6 -5.5" rotation="-90 270 90"></a-entity>
<!--Lamps on shelf-->

    </a-scene>
  </body>
</html>
